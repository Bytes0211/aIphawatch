name: Deploy Staging

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      api_image_uri: ${{ steps.meta.outputs.api_image_uri }}
      worker_image_uri: ${{ steps.meta.outputs.worker_image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Build and push worker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_WORKER_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Export image URIs
        id: meta
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
          WORKER_REPOSITORY: ${{ vars.ECR_WORKER_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "api_image_uri=$REGISTRY/$API_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "worker_image_uri=$REGISTRY/$WORKER_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Terraform apply + ECS rollout + smoke test
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/environments/staging
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: infra/environments/staging
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/environments/staging
        run: |
          terraform plan -input=false \
            -var "api_image=${{ needs.build.outputs.api_image_uri }}" \
            -var "worker_image=${{ needs.build.outputs.worker_image_uri }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: infra/environments/staging
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf
        working-directory: infra/environments/staging
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "api_service_name=$(terraform output -raw ecs_api_service_name)" >> "$GITHUB_OUTPUT"
          echo "worker_service_name=$(terraform output -raw ecs_worker_service_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket_id=$(terraform output -raw frontend_bucket_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Wait for ECS API service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.tf.outputs.cluster_name }}" \
            --services "${{ steps.tf.outputs.api_service_name }}"

      - name: Wait for ECS worker service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.tf.outputs.cluster_name }}" \
            --services "${{ steps.tf.outputs.worker_service_name }}"

      - name: Deploy frontend static assets (optional)
        if: vars.DEPLOY_FRONTEND_STATIC == 'true'
        run: |
          npm ci
          npm run build
          test -d out
          aws s3 sync out/ "s3://${{ steps.tf.outputs.frontend_bucket_id }}/" --delete

      - name: Invalidate CloudFront cache (optional)
        if: vars.DEPLOY_FRONTEND_STATIC == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Smoke test health endpoint
        run: |
          curl --fail --show-error --silent "http://${{ steps.tf.outputs.alb_dns_name }}/health"

      - name: Smoke test authenticated path enforcement
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "http://${{ steps.tf.outputs.alb_dns_name }}/api/watchlist")
          test "$STATUS" = "401"
