name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests + type + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Verify backend lockfile exists
        run: test -f uv.lock

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Run backend tests with coverage gate
        run: |
          uv run pytest tests/ \
            --cov=alphawatch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=74

      - name: Enforce critical-path coverage thresholds
        run: uv run python scripts/ci/coverage_gate.py coverage.json

      - name: Run mypy
        run: uv run mypy alphawatch/ || echo '::warning::mypy found type errors (non-blocking for Phase 1)'

      - name: Run ruff
        run: uv run ruff check alphawatch/

  frontend:
    name: Frontend tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify frontend lockfile exists
        run: test -f package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Frontend tests
        run: npm test -- --passWithNoTests

      - name: Frontend typecheck
        run: npx tsc --noEmit
